   t:[{x:"Grande organisation de l\u2019atelier",d:12},{x:"Inventaire des outils",d:5},{x:"Balayer tout l\u2019atelier",d:3}]},
  {w:4,n:"Dim",th:"Bilan mensuel",em:"\uD83E\uDD73",g:"linear-gradient(135deg,#b7791f,#f6e05e)",bg:"#fffff0",bc:"#744210",bb:"#fefcbf",
   t:[{x:"Tour final de la maison",d:5},{x:"Liste produits m\xE9nagers \xE0 acheter",d:5},{x:"Planifier le mois suivant",d:5},{x:"Se r\xE9compenser \u2014 un mois complet!",d:5}]}
];

var Q=[
  "Bienvenue! Pr\xEAt pour un mois propre? \uD83D\uDE80",
  "Chaque petite action compte! \uD83D\uDCAA",
  "Tu es sur la bonne lanc\xE9e! \uD83C\uDF1F",
  "\xC0 mi-chemin \u2014 continue! \uD83D\uDD25",
  "Plus que quelques jours \u2014 bravo! \uD83C\uDFAF",
  "La fin est proche \u2014 tu y es presque! \uD83C\uDFC5",
  "Mois complet! Tu es une machine! \uD83C\uDFC6"
];

var raw=lsG('pm28'), s=raw?JSON.parse(raw):{t:{},w:1,d:0};
if(!s.t)s.t={};
var cw=s.w||1, cd=s.d||0;

function sv(){
  s.w=cw; s.d=cd;
  lsS('pm28',JSON.stringify(s));
  if(fbOk&&fbRef){
    clearTimeout(saveTimer);
    saveTimer=setTimeout(function(){
      setSbar('sy','\u231B Sauvegarde en cours...');
      fbRef.set(s).then(function(){setSbar('on','\u2601\uFE0F Synchronis\xE9 avec le cloud');})
        .catch(function(){setSbar('off','\u26A0\uFE0F Erreur de synchronisation');});
    },600);
  }
}

function aT(){return D.reduce(function(a,d){return a+d.t.length;},0);}
function aD(){return D.reduce(function(a,d,i){return a+d.t.filter(function(t,j){return s.t[i+'_'+j];}).length;},0);}
function dD(i){return D[i].t.filter(function(t,j){return s.t[i+'_'+j];}).length;}
function dF(){return D.filter(function(d,i){return dD(i)===d.t.length;}).length;}
function tDow(){var d=new Date().getDay();return d===0?6:d-1;}

function rWT(){
  document.getElementById('wt').innerHTML=[1,2,3,4].map(function(w){
    return '<button class="wtb '+(cw===w?'on':'off')+'" onclick="setW('+w+')">Sem. '+w+'</button>';
  }).join('');
}

function rDG(){
  var dow=tDow(),h='';
  D.forEach(function(d,i){
    if(d.w!==cw)return;
    var ok=dD(i)===d.t.length,isT=(i%7)===dow;
    var cls='db'+(i===cd?' act':'')+(ok?' ok':'')+(isT?' td':'');
    h+='<button class="'+cls+'" onclick="setD('+i+')">';
    h+='<div class="da">'+d.n+'</div>';
    h+='<span class="de">'+(ok?'\u2705':d.em)+'</span>';
    h+='</button>';
  });
  document.getElementById('dg').innerHTML=h;
}

function rTC(){
  var d=D[cd],i=cd;
  var tot=d.t.reduce(function(a,t){return a+t.d;},0);
  var done=dD(i),pct=Math.round(done/d.t.length*100);
  var th='';
  d.t.forEach(function(t,j){
    var c=!!s.t[i+'_'+j];
    th+='<div class="ti'+(c?' dn':'')+'" onclick="tog('+i+','+j+')">';
    th+='<div class="ck'+(c?' on':'')+'">'+( c?'\u2713':'' )+'</div>';
    th+='<span class="tt">'+t.x+'</span>';
    th+='<span class="dur" style="background:'+d.bb+';color:'+d.bc+'">'+t.d+' min</span>';
    th+='</div>';
  });
  if(pct===100)th+='<div class="cong">\uD83C\uDF89 Journ\xE9e compl\xE9t\xE9e! Bravo!</div>';
  document.getElementById('tc').innerHTML=
    '<div class="tcw">'+
    '<div class="tch" style="background:'+d.g+'">'+
    '<div class="twl">Semaine '+d.w+' \xB7 Jour '+(i+1)+' / 28</div>'+
    '<div class="tcm">'+
    '<span class="tct">'+d.em+' '+d.th+'</span>'+
    '<div class="tbx"><div class="tbn">'+tot+'</div><div class="tbl">min</div></div>'+
    '</div>'+
    '<div class="dp">'+
    '<div class="dpr"><span>'+done+'/'+d.t.length+' t\xE2ches</span><span>'+pct+'%</span></div>'+
    '<div class="dpb"><div class="dpf" style="width:'+pct+'%"></div></div>'+
    '</div></div>'+
    '<div class="tcb" style="background:'+d.bg+'">'+th+'</div>'+
    '</div>';
}

function rG(){
  var tot=aT(),done=aD(),df=dF();
  var pct=Math.round(done/tot*100);
  document.getElementById('gpct').textContent=pct+'%';
  document.getElementById('gfill').style.width=pct+'%';
  document.getElementById('gct').textContent=done+' / '+tot+' t\xE2ches';
  document.getElementById('s1').textContent=done;
  document.getElementById('s2').textContent=df;
  document.getElementById('s3').textContent=28-df;
  var qi=Math.min(Math.floor(pct/100*(Q.length-1)),Q.length-1);
  document.getElementById('mot').textContent=Q[qi];
}

function render(){rWT();rDG();rTC();rG();}
function setW(w){cw=w;var f=D.findIndex(function(d){return d.w===w;});if(f>=0)cd=f;sv();render();}
function setD(i){cd=i;cw=D[i].w;sv();render();}
function tog(i,j){s.t[i+'_'+j]=!s.t[i+'_'+j];sv();render();}
function resetAll(){if(confirm('R\xE9initialiser tout le mois?')){s={t:{}};cw=1;cd=0;sv();render();}}

function showApp(){
  document.getElementById('ld').classList.add('hide');
  document.getElementById('app').style.opacity='1';
}

function boot(){
  if(!raw){cd=Math.min(tDow(),6);cw=1;}
  if(fbOk&&fbRef){
    var tmo=setTimeout(function(){
      document.getElementById('ld-s').textContent='Chargement depuis la m\xE9moire locale...';
      showApp();render();
    },5000);
    fbRef.once('value').then(function(snap){
      clearTimeout(tmo);
      var data=snap.val();
      if(data){s=data;if(!s.t)s.t={};cw=s.w||1;cd=s.d||0;lsS('pm28',JSON.stringify(s));}
      showApp();render();
    }).catch(function(){clearTimeout(tmo);showApp();render();});
  } else {
    showApp();render();
  }
}

boot();
</script>
</body>
</html>
